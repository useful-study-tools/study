<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像色反転ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* カスタムスクロールバーなどの調整用 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4 sm:p-8">

    <!-- トースト通知（エラーメッセージ用） -->
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-xl shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-50 flex items-center gap-2">
        <i data-lucide="alert-circle" class="w-5 h-5"></i>
        <span id="toastMessage">エラーが発生しました</span>
    </div>

    <!-- メインコンテナ -->
    <div class="max-w-xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        <div class="p-6 sm:p-10">
            <!-- ヘッダー -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-100 text-indigo-600 mb-4">
                    <i data-lucide="palette" class="w-8 h-8"></i>
                </div>
                <h1 class="text-2xl sm:text-3xl font-bold text-slate-800 tracking-tight">画像色反転ツール</h1>
                <p class="text-slate-500 mt-2 text-sm sm:text-base">画像の色をネガポジ反転して保存できます</p>
            </div>
            
            <!-- ドロップゾーン (アップロードエリア) -->
            <div id="dropZone" class="border-2 border-dashed border-slate-300 rounded-2xl p-8 sm:p-12 text-center cursor-pointer hover:bg-slate-50 hover:border-indigo-400 transition-all duration-200 group">
                <div class="bg-slate-100 group-hover:bg-indigo-50 rounded-full w-16 h-16 flex items-center justify-center mx-auto mb-4 transition-colors duration-200">
                    <i data-lucide="upload-cloud" class="w-8 h-8 text-slate-400 group-hover:text-indigo-500 transition-colors duration-200"></i>
                </div>
                <p class="text-slate-700 font-medium text-lg mb-1">画像を選択</p>
                <p class="text-slate-500 text-sm">または、ここにドラッグ＆ドロップ</p>
                <input type="file" id="fileInput" class="hidden" accept="image/*">
            </div>

            <!-- プレビューエリア (初期非表示) -->
            <div id="previewArea" class="hidden animate-fade-in">
                <!-- 画像表示用Canvas -->
                <div class="relative w-full bg-slate-100 rounded-xl overflow-hidden border border-slate-200 shadow-inner">
                   <canvas id="canvas" class="w-full h-auto block"></canvas>
                   <!-- 処理中インジケーター -->
                   <div id="loading" class="absolute inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center hidden">
                       <i data-lucide="loader-2" class="w-8 h-8 text-indigo-600 animate-spin mb-2"></i>
                       <span class="text-sm font-medium text-slate-700">処理中...</span>
                   </div>
                </div>
                
                <!-- アクションボタン -->
                <div class="mt-6 flex flex-col sm:flex-row gap-3 w-full">
                    <button id="resetBtn" class="flex-1 py-3.5 px-4 bg-slate-100 text-slate-700 rounded-xl font-medium hover:bg-slate-200 transition-colors duration-200 flex justify-center items-center gap-2 focus:outline-none focus:ring-2 focus:ring-slate-300">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                        別の画像を選ぶ
                    </button>
                    <button id="downloadBtn" class="flex-1 py-3.5 px-4 bg-indigo-600 text-white rounded-xl font-medium hover:bg-indigo-700 transition-colors duration-200 shadow-md hover:shadow-lg flex justify-center items-center gap-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                        <i data-lucide="download" class="w-5 h-5"></i>
                        ダウンロード
                    </button>
                </div>
            </div>
        </div>
        
        <!-- フッター -->
        <div class="bg-slate-50 px-6 py-4 border-t border-slate-100 text-center">
            <p class="text-xs text-slate-400">
                <i data-lucide="shield-check" class="w-3 h-3 inline-block mr-1"></i>
                画像はブラウザ上で処理され、サーバーには保存されません。
            </p>
        </div>
    </div>

    <script>
        // Lucideアイコンの初期化
        lucide.createIcons();

        // DOM要素の取得
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const resetBtn = document.getElementById('resetBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const loading = document.getElementById('loading');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        let currentFileName = 'inverted_image.png';
        let isProcessing = false;

        // トースト通知を表示する関数
        function showError(message) {
            toastMessage.textContent = message;
            toast.classList.remove('opacity-0');
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 3000);
        }

        // --- ドラッグ＆ドロップとクリックのイベント設定 ---

        // クリックでファイル選択ダイアログを開く
        dropZone.addEventListener('click', () => {
            if (!isProcessing) fileInput.click();
        });

        // ドラッグ中のスタイリング
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-indigo-500', 'bg-indigo-50');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-indigo-500', 'bg-indigo-50');
        });

        // ドロップ時の処理
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-indigo-500', 'bg-indigo-50');
            
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // ファイル選択時の処理
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // --- 画像処理のコアロジック ---

        function handleFile(file) {
            // 画像ファイルかどうかのチェック
            if (!file.type.startsWith('image/')) {
                showError('画像ファイル（JPG, PNGなど）を選択してください。');
                return;
            }

            isProcessing = true;

            // ダウンロード用のファイル名を作成 (元のファイル名_inverted.png)
            const fileNameWithoutExt = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            currentFileName = `${fileNameWithoutExt}_inverted.png`;

            // UIの切り替え
            dropZone.classList.add('hidden');
            previewArea.classList.remove('hidden');
            loading.classList.remove('hidden'); // 処理中スピナー表示

            const reader = new FileReader();
            
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // Canvasのサイズを画像の実際のサイズに設定
                    canvas.width = img.width;
                    canvas.height = img.height;

                    // 画像をCanvasに描画
                    ctx.drawImage(img, 0, 0);

                    // 非同期で画像処理を行う（UIフリーズを防ぐため）
                    setTimeout(() => {
                        invertColors();
                    }, 50);
                };
                
                img.onerror = function() {
                    showError('画像の読み込みに失敗しました。');
                    resetUI();
                };
                
                img.src = event.target.result;
            };

            reader.onerror = function() {
                showError('ファイルの読み込みに失敗しました。');
                resetUI();
            };

            reader.readAsDataURL(file);
        }

        // 色反転処理
        function invertColors() {
            try {
                // Canvasからピクセルデータを取得
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                // 全ピクセルをループしてRGB値を反転 (255 - 元の値)
                for (let i = 0; i < data.length; i += 4) {
                    data[i]     = 255 - data[i];     // Red
                    data[i + 1] = 255 - data[i + 1]; // Green
                    data[i + 2] = 255 - data[i + 2]; // Blue
                    // data[i + 3] (Alpha/透明度) はそのまま
                }

                // 処理したデータをCanvasに戻す
                ctx.putImageData(imageData, 0, 0);
            } catch (err) {
                console.error("画像処理エラー:", err);
                showError('画像の処理中にエラーが発生しました。');
            } finally {
                loading.classList.add('hidden'); // スピナー非表示
                isProcessing = false;
            }
        }

        // --- ダウンロードとリセット ---

        downloadBtn.addEventListener('click', () => {
            try {
                // Canvasの内容をData URL (PNG) として取得
                const dataURL = canvas.toDataURL('image/png');
                
                // ダウンロード用のリンクを動的に作成してクリックをシミュレート
                const link = document.createElement('a');
                link.download = currentFileName;
                link.href = dataURL;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (err) {
                console.error("ダウンロードエラー:", err);
                showError('画像の保存に失敗しました。');
            }
        });

        resetBtn.addEventListener('click', resetUI);

        function resetUI() {
            // UIを初期状態に戻す
            previewArea.classList.add('hidden');
            dropZone.classList.remove('hidden');
            fileInput.value = ''; // input fileをクリア
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Canvasをクリア
            isProcessing = false;
        }

    </script>
</body>
</html>
