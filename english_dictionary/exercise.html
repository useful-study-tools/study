<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英単語演習</title>
<style>
body { font-family: sans-serif; background:#f4f7f9; margin:0; padding:20px; }
.container { max-width:800px; margin:auto; }
.chapter-container { max-height:300px; overflow:auto; border:1px solid #ccc; padding:10px; border-radius:8px; background:white; }
.chapter-group-title { font-weight:bold; margin-top:10px; }
.chapter-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:4px; }
.card { border:2px solid #007bff; padding:40px; border-radius:10px; text-align:center; font-size:2rem; background:white; cursor:pointer; }
.option-btn { display:block; width:100%; padding:12px; margin:6px 0; border:1px solid #ccc; border-radius:6px; background:white; cursor:pointer; }
.option-btn:hover { background: #f0f0f0; }
</style>
</head>
<body>
<div class="container">
    <h2>単語演習</h2>
    <div id="setup">
        <p>出題範囲</p>
        <div class="chapter-container" id="chapterList"></div>
        <p>順序</p>
        <label><input type="radio" name="orderType" value="random" checked>ランダム</label>
        <label><input type="radio" name="orderType" value="sequential">番号順</label>
        <br><br>
        <label><input type="checkbox" id="basicOnly">基本語のみ</label>
        <br><br>
        <select id="mode">
            <option value="card-en-ja">暗記カード 英→日</option>
            <option value="card-ja-en">暗記カード 日→英</option>
            <option value="quiz-en-ja">4択 英→日</option>
            <option value="quiz-ja-en">4択 日→英</option>
            <option value="fill-blank">例文穴埋め</option>
        </select>
        <br><br>
        <button onclick="startExercise()">開始</button>
    </div>
    <div id="quiz" style="display:none">
        <p id="progress"></p>
        <div id="quizContainer"></div>
        <br>
        <button onclick="location.reload()">最初に戻る</button>
    </div>
</div>

<script>
// Pythonからデータを注入
const GROUPED_CHAPTERS = {"速読英単語": [{"id": 1, "label": "第1章：人間と動物の違い"}, {"id": 17, "label": "第2章：蝶が違いを見分ける方法⑴"}, {"id": 46, "label": "第3章：蝶が違いを見分ける方法⑵"}, {"id": 67, "label": "第4章：「原始的な」言語⑴"}, {"id": 87, "label": "第5章：「原始的な」言語⑵"}, {"id": 119, "label": "第6章：発音と食事の関係⑴"}, {"id": 138, "label": "第7章：発音と食事の関係⑵"}, {"id": 174, "label": "第8章：怒りのメカニズム"}, {"id": 215, "label": "第9章：ユーモアの種類と効能⑴"}, {"id": 245, "label": "第10章：ユーモアの種類と効能⑵"}, {"id": 272, "label": "第11章：孤立感⑴"}, {"id": 303, "label": "第12章：孤立感⑵"}, {"id": 341, "label": "第13章：暴力はなぜ起きる"}, {"id": 369, "label": "第14章：謙虚さが教えてくれること⑴"}, {"id": 403, "label": "第15章：謙虚さが教えてくれること⑵"}, {"id": 424, "label": "第16章：謙虚さが教えてくれること⑶"}, {"id": 441, "label": "第17章：人種差別を排除するには⑴"}, {"id": 473, "label": "第18章：人種差別を排除するには⑵"}, {"id": 502, "label": "第19章：受刑者に対する実験の是非⑴"}, {"id": 523, "label": "第20章：受刑者に対する実験の是非⑵"}, {"id": 558, "label": "第21章：ホーソン効果"}, {"id": 579, "label": "第22章：ジャンクフードから見る経済格差⑴"}, {"id": 594, "label": "第23章：ジャンクフードから見る経済格差⑵"}, {"id": 617, "label": "第24章：ジャンクフードから見る経済格差⑶"}, {"id": 629, "label": "第25章：ジャンクフードから見る経済格差⑷"}, {"id": 646, "label": "第26章：適切な塩の摂取量とは⑴"}, {"id": 671, "label": "第27章：適切な塩の摂取量とは⑵"}, {"id": 700, "label": "第28章：健康によい運動量の本当の目安⑴"}, {"id": 732, "label": "第29章：健康によい運動量の本当の目安⑵"}, {"id": 743, "label": "第30章：健康によい運動量の本当の目安⑶"}, {"id": 763, "label": "第31章：プラスチックが健康に与える影響⑴"}, {"id": 790, "label": "第32章：プラスチックが健康に与える影響⑵"}, {"id": 826, "label": "第33章：プラスチックが健康に与える影響⑶"}], "東進上級英単語1000": [{"id": 3974, "label": "ステージ1"}, {"id": 4074, "label": "ステージ2"}, {"id": 4174, "label": "ステージ3"}, {"id": 4274, "label": "ステージ4"}, {"id": 4374, "label": "ステージ5"}, {"id": 4474, "label": "ステージ6"}, {"id": 4574, "label": "ステージ7"}, {"id": 4674, "label": "ステージ8"}, {"id": 4774, "label": "ステージ9"}, {"id": 4874, "label": "ステージ10"}], "LEAP": [{"id": 10001, "label": "1〜100"}, {"id": 10101, "label": "101〜200"}, {"id": 10201, "label": "201〜300"}, {"id": 10301, "label": "301〜400"}, {"id": 10401, "label": "401〜500"}, {"id": 10501, "label": "501〜600"}, {"id": 10601, "label": "601〜700"}, {"id": 10701, "label": "701〜800"}, {"id": 10801, "label": "801〜900"}, {"id": 10901, "label": "901〜1000"}, {"id": 11001, "label": "1001〜1100"}, {"id": 11101, "label": "1101〜1200"}, {"id": 11201, "label": "1201〜1300"}, {"id": 11301, "label": "1301〜1400"}, {"id": 11401, "label": "1401〜1500"}, {"id": 11501, "label": "1501〜1600"}, {"id": 11601, "label": "1601〜1700"}, {"id": 11701, "label": "1701〜1800"}, {"id": 11801, "label": "1801〜1900"}, {"id": 11901, "label": "1901〜1935"}]};
const NUMBER_TO_FILE = {"1": "vocabulary_data_1.json", "2": "vocabulary_data_2.json", "3": "vocabulary_data_3.json", "4": "vocabulary_data_4.json", "5": "vocabulary_data_5.json", "8": "vocabulary_data_8.json", "9": "vocabulary_data_9.json", "10": "vocabulary_data_10.json", "11": "vocabulary_data_11.json", "12": "vocabulary_data_12.json", "13": "vocabulary_data_13.json", "14": "vocabulary_data_14.json", "15": "vocabulary_data_15.json", "16": "vocabulary_data_16.json", "17": "vocabulary_data_17.json", "18": "vocabulary_data_18.json", "19": "vocabulary_data_19.json", "20": "vocabulary_data_20.json", "21": "vocabulary_data_21.json", "22": "vocabulary_data_22.json", "23": "vocabulary_data_23.json", "24": "vocabulary_data_24.json", "25": "vocabulary_data_25.json", "26": "vocabulary_data_26.json", "27": "vocabulary_data_27.json", "28": "vocabulary_data_28.json", "29": "vocabulary_data_29.json", "30": "vocabulary_data_30.json", "31": "vocabulary_data_31.json", "51": "vocabulary_data_51.json", "52": "vocabulary_data_52.json", "53": "vocabulary_data_53.json", "54": "vocabulary_data_54.json", "55": "vocabulary_data_55.json", "56": "vocabulary_data_56.json", "57": "vocabulary_data_57.json", "58": "vocabulary_data_58.json", "59": "vocabulary_data_59.json", "60": "vocabulary_data_60.json", "110": "vocabulary_data_110.json", "111": "vocabulary_data_111.json", "112": "vocabulary_data_112.json", "113": "vocabulary_data_113.json", "114": "vocabulary_data_114.json", "115": "vocabulary_data_115.json", "116": "vocabulary_data_116.json", "117": "vocabulary_data_117.json", "118": "vocabulary_data_118.json", "119": "vocabulary_data_119.json"};

const FILE_THRESHOLDS = Object.keys(NUMBER_TO_FILE).map(Number).sort((a,b)=>a-b);
let quizWords=[];
let currentIndex=0;
let loadedWords=[];

const chapterList=document.getElementById("chapterList");
for(const [group, chapters] of Object.entries(GROUPED_CHAPTERS)){
    const title=document.createElement("div");
    title.className="chapter-group-title";
    title.innerText=group;
    chapterList.appendChild(title);
    const grid=document.createElement("div");
    grid.className="chapter-grid";
    chapters.forEach(ch=>{
        const div=document.createElement("div");
        div.innerHTML=`<label><input type="checkbox" value="${ch.id}">${ch.label}</label>`;
        grid.appendChild(div);
    });
    chapterList.appendChild(grid);
}

function getFileForNumber(n){
    for(let i=FILE_THRESHOLDS.length-1; i>=0; i--){
        if(n>=FILE_THRESHOLDS[i]) return NUMBER_TO_FILE[FILE_THRESHOLDS[i]];
    }
    return null;
}

async function startExercise(){
    const selectedIds=[...document.querySelectorAll("#chapterList input:checked")].map(e=>parseInt(e.value));
    if(selectedIds.length==0){ alert("チャプター選択してください"); return; }
    const files=new Set();
    selectedIds.forEach(id=>{ const f=getFileForNumber(id); if(f) files.add(f); });

    try{
        loadedWords=[];
        for(const file of files){
            const res=await fetch(file);
            const data=await res.json();
            data.words.forEach(w=>{
                loadedWords.push({
                    n:String(w.number), w:w.word, m:w.meaning, examples:w.example_sections||[]
                });
            });
        }
        buildQuiz(selectedIds);
    }catch(e){ alert("JSON読み込み失敗"); console.error(e); }
}

function buildQuiz(selectedIds){
    const thresholds=Object.values(GROUPED_CHAPTERS).flat().map(c=>c.id).sort((a,b)=>a-b);
    const basicOnly=document.getElementById("basicOnly").checked;
    quizWords=loadedWords.filter(w=>{
        if(basicOnly && w.n.includes("-")) return false;
        const n=parseInt(w.n.split("-")[0]);
        let chapter=null;
        for(let i=thresholds.length-1; i>=0; i--){
            if(n>=thresholds[i]){ chapter=thresholds[i]; break; }
        }
        return selectedIds.includes(chapter);
    });
    if(quizWords.length==0){ alert("単語が見つかりませんでした"); return; }
    if(document.querySelector('input[name="orderType"]:checked').value=="random"){
        quizWords.sort(()=>Math.random()-0.5);
    }else{
        quizWords.sort((a,b)=>parseInt(a.n)-parseInt(b.n));
    }
    document.getElementById("setup").style.display="none";
    document.getElementById("quiz").style.display="block";
    currentIndex=0;
    showQuestion();
}

function showQuestion(){
    const word=quizWords[currentIndex];
    document.getElementById("progress").innerText=`${currentIndex+1} / ${quizWords.length}  No.${word.n}`;
    const mode=document.getElementById("mode").value;
    if(mode.startsWith("card")) showCard(word,mode);
    else if(mode.startsWith("quiz")) showQuiz(word,mode);
    else showFillBlank(word);
}

function showCard(word,mode){
    const front=mode=="card-en-ja"?word.w:word.m;
    const back=mode=="card-en-ja"?word.m:word.w;
    const container=document.getElementById("quizContainer");
    container.innerHTML=`<div class="card" onclick="nextCard('${back}')">${front}</div>`;
}

function nextCard(ans){
    const c=document.querySelector(".card");
    if(c.innerText!=ans){ c.innerText=ans; return; }
    currentIndex++;
    if(currentIndex>=quizWords.length) finish();
    else showQuestion();
}

function showQuiz(word,mode){
    const container=document.getElementById("quizContainer");
    const isEnJa=mode=="quiz-en-ja";
    container.innerHTML=`<div class="card">${isEnJa?word.w:word.m}</div><div id="opts"></div>`;
    const opts=[word];
    while(opts.length<4 && quizWords.length>opts.length){
        const r=quizWords[Math.floor(Math.random()*quizWords.length)];
        if(!opts.find(o=>o.n==r.n)) opts.push(r);
    }
    opts.sort(()=>Math.random()-0.5);
    const div=document.getElementById("opts");
    opts.forEach(o=>{
        const b=document.createElement("button");
        b.className="option-btn";
        b.innerText=isEnJa?o.m:o.w;
        b.onclick=()=>{
            if(o.n==word.n){ currentIndex++; if(currentIndex>=quizWords.length) finish(); else showQuestion(); }
            else{ b.style.background="#f8d7da"; }
        };
        div.appendChild(b);
    });
}

function showFillBlank(word){
    const container=document.getElementById("quizContainer");
    if(!word.examples.length){ currentIndex++; showQuestion(); return; }
    const sec=word.examples[Math.floor(Math.random()*word.examples.length)];
    const ex=sec.examples[Math.floor(Math.random()*sec.examples.length)];
    container.innerHTML=`<p>${ex.ja}</p><p>${ex.en.replace(new RegExp(ex.highlight, 'gi'), '____')}</p>
    <input id="ans" placeholder="答えを入力">
    <button onclick="checkAnswer('${ex.highlight}')">判定</button>`;
}

function checkAnswer(ans){
    const v=document.getElementById("ans").value.trim().toLowerCase();
    if(v==ans.toLowerCase()) alert("正解！");
    else alert("正解は: "+ans);
    currentIndex++;
    if(currentIndex>=quizWords.length) finish();
    else showQuestion();
}

function finish(){ alert("終了！お疲れ様でした。"); location.reload(); }
</script>
</body>
</html>
