        <div class="section-title">現代語訳</div>
        <div class="meaning-jp">①見せる ②結婚させる</div>
        
        <div class="nuance-box">
            <strong>【解釈のポイント】</strong><br>「見る」に使役の助動詞「す」が結びついた形です。「（物を）見せる」という基本の意味から、「（人に）見せる」＝「結婚させる」という重要な意味に派生しました。「見る（結婚する）」の使役形と覚えておきましょう。
        </div>

        <div class="section-title">例文</div>
        
        <div class="example-item">
            <span class="ex-text">姿なきゆゑに、万の像を見す。</span>
            <span class="ex-trans">姿を持たないからこそ、すべての姿を見せるのだ。</span>
            <span class="ex-source">― 徒然草</span>
        </div>
        <div class="example-item">
            <span class="ex-text">かの娘見せ奉らむ。</span>
            <span class="ex-trans">あの娘を（あなたに）結婚させ申し上げよう。</span>
            <span class="ex-source">― 源氏</span>
        </div>
