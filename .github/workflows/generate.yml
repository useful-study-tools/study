name: Generate Vocabulary HTML Files (English & Classical Japanese)

on:
  push:
    branches:
      - main
    paths:
      - 'english_dictionary/vocabulary_data*.json'
      - 'english_dictionary/config.py'
      - 'classical_japanese_dictionary/vocabulary_data*.json'
      - 'classical_japanese_dictionary/config.py'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ==========================================
      # 1. 英単語辞書の処理
      # ==========================================
      - name: Process English Dictionary
        run: |
          echo "🔧 Processing English Dictionary..."
          # Pythonパスを通す（config.pyをimport可能にするため）
          export PYTHONPATH=$PYTHONPATH:$(pwd)/english_dictionary
          
          # 単語数をカウントして config.py を更新
          python english_dictionary/count_words.py
          
          # 各種HTML生成スクリプトの実行
          mkdir -p english_dictionary/data
          python english_dictionary/generate_vocab.py
          python english_dictionary/build_index.py
          python english_dictionary/generate_exercise.py
          echo "✅ English Dictionary updated"

      # ==========================================
      # 2. 古文単語辞書の処理
      # ==========================================
      - name: Process Classical Japanese Dictionary
        run: |
          echo "🌸 Processing Classical Japanese Dictionary..."
          # Pythonパスを通す
          export PYTHONPATH=$PYTHONPATH:$(pwd)/classical_japanese_dictionary
          
          # 古文側も同様の仕組み(count_words.py)がある場合は実行
          if [ -f classical_japanese_dictionary/count_words.py ]; then
            python classical_japanese_dictionary/count_words.py
          fi
          
          mkdir -p classical_japanese_dictionary/data
          python classical_japanese_dictionary/generate_vocab.py
          python classical_japanese_dictionary/build_index.py
          python classical_japanese_dictionary/generate_exercise.py
          echo "✅ Classical Japanese Dictionary updated"
      
      # ==========================================
      # 3. 変更チェックとコミット
      # ==========================================
      - name: Check for changes
        id: check_changes
        run: |
          TARGET_PATHS="english_dictionary/ classical_japanese_dictionary/"
          if [ -n "$(git status --porcelain $TARGET_PATHS)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            git status --porcelain $TARGET_PATHS
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 書き換わった config.py と 生成された HTML 群をすべて追加
          git add english_dictionary/config.py
          git add english_dictionary/exercise.html
          git add english_dictionary/index.html
          git add english_dictionary/data/*.html
          
          git add classical_japanese_dictionary/config.py
          git add classical_japanese_dictionary/exercise.html
          git add classical_japanese_dictionary/index.html
          git add classical_japanese_dictionary/data/*.html
          
          git commit -m "🤖 Auto-generate vocab HTML & Update word counts [skip ci]"
          git push
      
      # ==========================================
      # 4. 完了サマリー
      # ==========================================
      - name: Job summary
        run: |
          echo "## 📊 Generation Summary" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🇺🇸 English Dictionary" >> $GITHUB_STEP_SUMMARY
          if [ -d "english_dictionary/data" ]; then
            total_en=$(ls -1 english_dictionary/data/*.html 2>/dev/null | wc -l)
            echo "- Total: **$total_en HTML files** generated." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "### 🌸 Classical Japanese Dictionary" >> $GITHUB_STEP_SUMMARY
          if [ -d "classical_japanese_dictionary/data" ]; then
            total_jp=$(ls -1 classical_japanese_dictionary/data/*.html 2>/dev/null | wc -l)
            echo "- Total: **$total_jp HTML files** generated." >> $GITHUB_STEP_SUMMARY
          fi
