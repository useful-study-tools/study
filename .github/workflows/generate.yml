name: Generate Vocabulary HTML Files

on:
  push:
    branches:
      - main
    paths:
      - 'english_dictionary/**'
      - 'classical_japanese_dictionary/**'
      - 'japanese_history/**' # 今後の日本史用
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # どのディレクトリが変更されたかを判定
      - name: Check which dictionary changed
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            english:
              - 'english_dictionary/vocabulary_data*.json'
              - 'english_dictionary/config.py'
            classical:
              - 'classical_japanese_dictionary/vocabulary_data*.json'
            history:
              - 'japanese_history/vocabulary_data*.json'

      # ==========================================
      # 1. 英単語辞書 (英語に変更があった場合のみ)
      # ==========================================
      - name: Process English Dictionary
        if: steps.filter.outputs.english == 'true'
        run: |
          echo "🔧 Processing English Dictionary..."
          mkdir -p english_dictionary/data
          python english_dictionary/generate_vocab.py
          python english_dictionary/build_index.py
          python english_dictionary/generate_exercise.py

      # ==========================================
      # 2. 古文単語辞書 (古文に変更があった場合のみ)
      # ==========================================
      - name: Process Classical Japanese Dictionary
        if: steps.filter.outputs.classical == 'true'
        run: |
          echo "🌸 Processing Classical Japanese Dictionary..."
          mkdir -p classical_japanese_dictionary/data
          python classical_japanese_dictionary/generate_vocab.py
          python classical_japanese_dictionary/build_index.py
          python classical_japanese_dictionary/generate_exercise.py

      # ==========================================
      # 3. 日本史辞書 (日本史に変更があった場合のみ)
      # ==========================================
      - name: Process Japanese History Dictionary
        if: steps.filter.outputs.history == 'true'
        run: |
          echo "🗾 Processing Japanese History Dictionary..."
          mkdir -p japanese_history/data
          # 日本史用のスクリプト名が他と同一であることを想定
          python japanese_history/generate_vocab.py
          python japanese_history/build_index.py
          python japanese_history/generate_exercise.py

      # ==========================================
      # 4. 変更チェックと安全なコミット
      # ==========================================
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 不要なキャッシュファイルを除外して、全辞書のdataディレクトリとhtmlをステージング
          git add */data/*.html */index.html */exercise.html
          
          # 差分があるか確認してからコミット (|| true でエラーによる停止を防ぐ)
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "🤖 Auto-generate vocab HTML files [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
      
      # ==========================================
      # 5. 完了サマリー
      # ==========================================
      - name: Job summary
        run: |
          echo "## 📊 Generation Summary" >> $GITHUB_STEP_SUMMARY
          
          for dir in "english_dictionary" "classical_japanese_dictionary" "japanese_history"; do
            if [ -d "$dir/data" ]; then
              count=$(ls -1 $dir/data/*.html 2>/dev/null | wc -l)
              echo "- **$dir**: $count HTML files" >> $GITHUB_STEP_SUMMARY
            fi
          done
