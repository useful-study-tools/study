<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超本格ジグソーパズル (ガイド・自動詰め機能付き)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a202c;
            touch-action: none; /* デフォルトのスクロール/ズームを無効化 */
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        /* UIオーバーレイ */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #ui-layer > * {
            pointer-events: auto;
        }
        /* 読み込み中画面 */
        #loading {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: opacity 0.3s;
        }
        .loader {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- ゲーム描画用キャンバス -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI層 -->
    <div id="ui-layer" class="p-2 sm:p-4">
        <div class="bg-gray-800/95 text-white p-3 rounded-xl shadow-2xl flex flex-wrap gap-4 items-center justify-between max-w-5xl mx-auto backdrop-blur border border-gray-600">
            <h1 class="text-lg font-bold tracking-wider text-blue-300">本格ジグソー</h1>
            
            <div class="flex flex-wrap gap-4 items-center text-sm">
                <div class="flex items-center gap-2">
                    <label for="image-select" class="text-gray-300 font-semibold">画像:</label>
                    <select id="image-select" class="text-black px-2 py-1.5 rounded bg-white focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                        <option value="puzzle1.png">puzzle1.png</option>
                        <option value="puzzle2.png">puzzle2.png</option>
                        <option value="puzzle3.png">puzzle3.png</option>
                        <option value="puzzle4.png">puzzle4.png</option>
                        <option value="puzzle5.png">puzzle5.png</option>
                    </select>
                </div>

                <div class="flex items-center gap-2">
                    <label for="difficulty-select" class="text-gray-300 font-semibold">難易度:</label>
                    <select id="difficulty-select" class="text-black px-2 py-1.5 rounded bg-white focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                        <option value="30,20">簡単 (30×20 = 600P)</option>
                        <option value="45,30" selected>普通 (45×30 = 1350P)</option>
                        <option value="60,40">難関 (60×40 = 2400P)</option>
                        <option value="90,60">最難関 (90×60 = 5400P)</option>
                    </select>
                </div>
                
                <!-- 補助線のON/OFFトグル -->
                <div class="flex items-center gap-2 ml-2">
                    <label class="flex items-center gap-1.5 cursor-pointer text-gray-300 font-semibold hover:text-white transition">
                        <input type="checkbox" id="guide-toggle" checked class="w-4 h-4 accent-blue-500 cursor-pointer">
                        補助線
                    </label>
                </div>

                <button id="start-btn" class="bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white px-6 py-1.5 rounded font-bold transition shadow-lg border border-blue-400">
                    生成スタート
                </button>
            </div>
            
            <div class="text-xs text-gray-400 w-full text-center mt-1">
                操作: ボードをドラッグで移動 / ホイール(ピンチ)でズーム / 下部トレイからピースをドラッグ
            </div>
        </div>
        
        <!-- クリア時のメッセージ -->
        <div id="win-message" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black/90 p-10 rounded-3xl border-4 border-yellow-500 text-center hidden shadow-[0_0_30px_rgba(234,179,8,0.5)]">
            <h2 class="text-5xl font-black text-white mb-6 tracking-widest drop-shadow-md">CLEAR!</h2>
            <p class="text-yellow-400 text-2xl font-bold mb-8">すべてのピースが揃いました</p>
            <button id="restart-btn" class="bg-gradient-to-r from-yellow-500 to-yellow-400 hover:from-yellow-400 hover:to-yellow-300 text-black px-10 py-3 rounded-full font-black text-xl transition transform hover:scale-105 shadow-xl">
                新しく始める
            </button>
        </div>
    </div>

    <!-- ローディング画面 -->
    <div id="loading" class="hidden">
        <div class="loader"></div>
        <div class="text-2xl font-bold mb-2">パズルを生成中...</div>
        <div class="text-gray-400 text-sm">ピース数が多い場合、数秒かかることがあります</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        
        // UI要素
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const loadingDiv = document.getElementById('loading');
        const winMessage = document.getElementById('win-message');
        const imageSelect = document.getElementById('image-select');
        const difficultySelect = document.getElementById('difficulty-select');
        const guideToggle = document.getElementById('guide-toggle');

        // ゲーム状態
        let state = {
            isPlaying: false,
            pieces: [],        // トレイにある未配置のピース配列
            placedCount: 0,
            totalPieces: 0,
            showGuide: true,   // 補助線の表示状態
            
            // カメラ
            camera: { x: 0, y: 0, zoom: 1 },
            
            // トレイ (画面下部)
            trayHeight: 160,
            trayScrollX: 0,
            maxTrayScroll: 0,
            traySpacing: 0,
            sbHeight: 16, // スクロールバーの高さ
            
            // ドラッグ＆ドロップ
            draggingPiece: null,
            dragOriginalIndex: -1, // ドラッグ開始時のトレイ内のインデックス
            dragOffset: { x: 0, y: 0 },
            dragPos: { x: 0, y: 0 },
            
            // パン・スクロール状態
            isPanning: false,
            isTrayScrolling: false,
            isDraggingScrollbar: false,
            lastPanPoint: { x: 0, y: 0 },
            
            // マルチタッチ管理
            pointers: {},
            lastPinchCenter: null,
            initialPinchDist: 0,
            initialPinchZoom: 1,

            // パズルデータ
            img: null,
            pw: 0, 
            ph: 0, 
            tabSize: 0,
            cols: 0,
            rows: 0,
            
            // オフスクリーンキャンバス
            boardCanvas: null, // 配置済みピース
            boardCtx: null,
            guideCanvas: null, // ピースの輪郭線(ガイド)
            guideCtx: null
        };

        // イベントリスナー
        guideToggle.addEventListener('change', (e) => {
            state.showGuide = e.target.checked;
        });

        // リサイズ処理
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (!state.isPlaying) {
                renderTitleScreen();
            } else {
                updateTrayScrollBounds();
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // スタート
        startBtn.addEventListener('click', () => {
            loadingDiv.classList.remove('hidden');
            winMessage.classList.add('hidden');
            // 描画を更新してから重い処理を開始
            setTimeout(startGame, 50);
        });
        
        restartBtn.addEventListener('click', () => {
            winMessage.classList.add('hidden');
            loadingDiv.classList.remove('hidden');
            setTimeout(startGame, 50);
        });

        async function startGame() {
            state.isPlaying = false;
            state.pieces = [];
            state.placedCount = 0;
            state.camera = { x: 0, y: 0, zoom: 1 };
            state.trayScrollX = 0;
            state.draggingPiece = null;
            state.dragOriginalIndex = -1;
            state.showGuide = guideToggle.checked;
            
            const [cols, rows] = difficultySelect.value.split(',').map(Number);
            state.cols = cols;
            state.rows = rows;
            state.totalPieces = cols * rows;

            const imageUrl = imageSelect.value;
            
            try {
                const img = await loadImage(imageUrl);
                state.img = img;
                setupPuzzle();
                state.isPlaying = true;
            } catch (error) {
                console.error("画像読み込みエラー", error);
                alert("画像の読み込みに失敗しました。");
            } finally {
                loadingDiv.classList.add('hidden');
            }
        }

        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => resolve(img);
                img.onerror = () => {
                    console.log("ローカル画像が見つからないため、縦横比2:3のダミー画像を読み込みます。");
                    // 縦2:横3 = 高さ:幅 = 2:3 = 1000:1500 (横長画像)
                    img.src = `https://picsum.photos/1500/1000?random=${Math.random()}`;
                    img.onerror = reject;
                };
                img.src = src;
            });
        }

        function setupPuzzle() {
            const img = state.img;
            state.pw = img.width / state.cols;
            state.ph = img.height / state.rows;
            // 凸凹のサイズ
            state.tabSize = Math.min(state.pw, state.ph) * 0.22;
            
            // トレイ内のピース間隔
            state.traySpacing = state.pw + state.tabSize * 2 + 15;
            
            // 凸凹のパターン生成 (1: 凸, -1: 凹, 0: 直線)
            const hEdges = []; 
            for (let c = 0; c < state.cols; c++) {
                hEdges[c] = [];
                for (let r = 0; r <= state.rows; r++) {
                    hEdges[c][r] = (r === 0 || r === state.rows) ? 0 : (Math.random() > 0.5 ? 1 : -1);
                }
            }
            const vEdges = [];
            for (let c = 0; c <= state.cols; c++) {
                vEdges[c] = [];
                for (let r = 0; r < state.rows; r++) {
                    vEdges[c][r] = (c === 0 || c === state.cols) ? 0 : (Math.random() > 0.5 ? 1 : -1);
                }
            }

            state.pieces = [];
            for (let c = 0; c < state.cols; c++) {
                for (let r = 0; r < state.rows; r++) {
                    state.pieces.push({
                        id: `p_${c}_${r}`,
                        c: c,
                        r: r,
                        top: r === 0 ? 0 : -hEdges[c][r],
                        right: c === state.cols - 1 ? 0 : vEdges[c+1][r],
                        bottom: r === state.rows - 1 ? 0 : hEdges[c][r+1],
                        left: c === 0 ? 0 : -vEdges[c][r]
                    });
                }
            }

            // トレイ用にシャッフル
            shuffleArray(state.pieces);
            updateTrayScrollBounds();

            // --- オフスクリーンキャンバスの準備 ---
            
            // 1. 配置済みピース用キャンバス
            state.boardCanvas = document.createElement('canvas');
            state.boardCanvas.width = img.width;
            state.boardCanvas.height = img.height;
            state.boardCtx = state.boardCanvas.getContext('2d');

            // 2. 輪郭ガイド用キャンバス
            state.guideCanvas = document.createElement('canvas');
            state.guideCanvas.width = img.width;
            state.guideCanvas.height = img.height;
            state.guideCtx = state.guideCanvas.getContext('2d');
            
            // ガイド線を描画
            state.guideCtx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            state.guideCtx.lineWidth = 1.5;
            // 影をつけて見やすくする
            state.guideCtx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            state.guideCtx.shadowBlur = 2;

            for (let c = 0; c < state.cols; c++) {
                for (let r = 0; r < state.rows; r++) {
                    // ダミーのピースオブジェクトを作ってパスを描画
                    const dummyP = {
                        top: r === 0 ? 0 : -hEdges[c][r],
                        right: c === state.cols - 1 ? 0 : vEdges[c+1][r],
                        bottom: r === state.rows - 1 ? 0 : hEdges[c][r+1],
                        left: c === 0 ? 0 : -vEdges[c][r]
                    };
                    state.guideCtx.save();
                    state.guideCtx.translate(c * state.pw, r * state.ph);
                    drawPiecePath(state.guideCtx, dummyP);
                    state.guideCtx.stroke();
                    state.guideCtx.restore();
                }
            }
            
            // カメラ初期位置 (画面に収める)
            const availableHeight = canvas.height - state.trayHeight - 20; 
            const scaleW = (canvas.width - 40) / img.width;
            const scaleH = availableHeight / img.height;
            state.camera.zoom = Math.min(scaleW, scaleH);
            state.camera.x = (canvas.width - img.width * state.camera.zoom) / 2;
            state.camera.y = Math.max(80, (availableHeight - img.height * state.camera.zoom) / 2); // UIに被らないよう少し下げる
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function updateTrayScrollBounds() {
            const contentWidth = state.pieces.length * state.traySpacing;
            state.maxTrayScroll = Math.max(0, contentWidth - canvas.width + state.pw + state.tabSize * 2);
            state.trayScrollX = Math.min(state.trayScrollX, state.maxTrayScroll);
        }

        // --- 描画ロジック ---

        function renderTitleScreen() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // タイトル画面の装飾
            ctx.fillStyle = '#1e293b';
            for (let i = 0; i < 20; i++) {
                ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 100, 100);
            }
        }

        function render() {
            if (!state.isPlaying) return;

            // 1. 全体クリア
            ctx.fillStyle = '#1e293b'; // ボード背景
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. ボード領域の描画
            ctx.save();
            ctx.beginPath();
            ctx.rect(0, 0, canvas.width, canvas.height - state.trayHeight);
            ctx.clip();

            ctx.translate(state.camera.x, state.camera.y);
            ctx.scale(state.camera.zoom, state.camera.zoom);

            // ボードの枠と暗い背景画像
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, state.img.width, state.img.height);
            ctx.globalAlpha = 0.3;
            ctx.drawImage(state.img, 0, 0);
            ctx.globalAlpha = 1.0;
            
            // ピースの輪郭線(ガイド)を描画 (トグルで切り替え)
            if (state.showGuide) {
                ctx.drawImage(state.guideCanvas, 0, 0);
            }

            // 固定済みピースの描画
            ctx.drawImage(state.boardCanvas, 0, 0);

            // 外枠
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 3 / state.camera.zoom;
            ctx.strokeRect(0, 0, state.img.width, state.img.height);

            // ドロップ可能時のハイライト描画
            if (state.draggingPiece) {
                const bx = (state.dragPos.x - state.camera.x) / state.camera.zoom;
                const by = (state.dragPos.y - state.camera.y) / state.camera.zoom;
                const correctX = state.draggingPiece.c * state.pw;
                const correctY = state.draggingPiece.r * state.ph;
                const tolerance = Math.min(state.pw, state.ph) * 0.25;
                
                // 正解位置に十分近い場合、そのマスを黄色くハイライト
                if (Math.hypot(bx - correctX, by - correctY) <= tolerance) {
                    ctx.save();
                    ctx.translate(correctX, correctY);
                    
                    ctx.fillStyle = 'rgba(250, 204, 21, 0.4)'; // Tailwind yellow-400相当の半透明
                    ctx.shadowColor = 'rgba(250, 204, 21, 0.8)';
                    ctx.shadowBlur = 15;
                    
                    drawPiecePath(ctx, state.draggingPiece);
                    ctx.fill();
                    
                    ctx.lineWidth = 3 / state.camera.zoom;
                    ctx.strokeStyle = 'rgba(250, 204, 21, 0.9)';
                    ctx.stroke();
                    
                    ctx.restore();
                }
            }

            ctx.restore();

            // 3. トレイ領域の描画
            const ty = canvas.height - state.trayHeight;
            ctx.fillStyle = '#334155'; // トレイ背景
            ctx.fillRect(0, ty, canvas.width, state.trayHeight);
            
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(0, ty);
            ctx.lineTo(canvas.width, ty);
            ctx.stroke();

            // トレイ内のピースを描画
            ctx.save();
            ctx.beginPath();
            // スクロールバー領域にはみ出さないようにクリップ
            ctx.rect(0, ty, canvas.width, state.trayHeight - state.sbHeight);
            ctx.clip(); 

            // 表示スケール
            const scale = Math.min(1, (state.trayHeight - state.sbHeight - 20) / (state.ph + state.tabSize*2));
            const pTy = ty + (state.trayHeight - state.sbHeight - state.ph*scale)/2;

            state.pieces.forEach((p, index) => {
                const px = index * state.traySpacing - state.trayScrollX + state.tabSize;
                // 画面内にあるピースのみ描画 (カリング)
                if (px + (state.pw + state.tabSize*2)*scale > 0 && px - state.tabSize*scale < canvas.width) {
                    renderTrayPiece(ctx, p, px, pTy, scale);
                }
            });
            ctx.restore();

            // 4. トレイのスクロールバー描画
            drawScrollbar(ctx, ty + state.trayHeight - state.sbHeight);

            // 5. ドラッグ中のピースを最前面に描画
            if (state.draggingPiece) {
                renderDragPiece(ctx, state.draggingPiece, state.dragPos.x, state.dragPos.y);
            }
        }

        // ピースパスの描画
        function drawEdgeCurve(ctx, len, tabDir, tabSize) {
            if (tabDir === 0) {
                ctx.lineTo(len, 0);
                return;
            }
            const cx = len / 2;
            const neckW = len * 0.12;
            const headW = len * 0.18;
            const tabH = tabSize * tabDir;
            
            ctx.lineTo(cx - headW, 0);
            ctx.bezierCurveTo(cx - neckW, 0, cx - headW, tabH, cx, tabH);
            ctx.bezierCurveTo(cx + headW, tabH, cx + neckW, 0, cx + headW, 0);
            ctx.lineTo(len, 0);
        }

        function drawPiecePath(ctx, piece) {
            ctx.beginPath();
            ctx.moveTo(0, 0);
            const pw = state.pw, ph = state.ph, ts = state.tabSize;

            drawEdgeCurve(ctx, pw, piece.top, ts);
            ctx.translate(pw, 0); ctx.rotate(Math.PI/2);
            drawEdgeCurve(ctx, ph, piece.right, ts);
            ctx.translate(ph, 0); ctx.rotate(Math.PI/2);
            drawEdgeCurve(ctx, pw, piece.bottom, ts);
            ctx.translate(pw, 0); ctx.rotate(Math.PI/2);
            drawEdgeCurve(ctx, ph, piece.left, ts);
            ctx.translate(ph, 0); ctx.rotate(Math.PI/2);
        }

        // トレイ内のピース描画
        function renderTrayPiece(ctx, piece, x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);

            // 影
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 6;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;

            drawPiecePath(ctx, piece);
            ctx.clip();

            const srcX = piece.c * state.pw;
            const srcY = piece.r * state.ph;
            const ts = state.tabSize;
            
            ctx.drawImage(state.img, 
                srcX - ts, srcY - ts, state.pw + ts*2, state.ph + ts*2,
                -ts, -ts, state.pw + ts*2, state.ph + ts*2
            );

            ctx.lineWidth = 2;
            ctx.strokeStyle = 'rgba(0,0,0,0.6)';
            ctx.stroke();
            ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.stroke();
            ctx.restore();
        }

        // ドラッグ中のピース描画
        function renderDragPiece(ctx, piece, x, y) {
            ctx.save();
            ctx.translate(x, y);
            
            // ドラッグ中は少し拡大して浮かせる
            ctx.scale(1.05, 1.05);
            ctx.shadowColor = 'rgba(0,0,0,0.7)';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetX = 10;
            ctx.shadowOffsetY = 10;

            drawPiecePath(ctx, piece);
            ctx.clip();

            const srcX = piece.c * state.pw;
            const srcY = piece.r * state.ph;
            const ts = state.tabSize;
            
            ctx.drawImage(state.img, 
                srcX - ts, srcY - ts, state.pw + ts*2, state.ph + ts*2,
                -ts, -ts, state.pw + ts*2, state.ph + ts*2
            );

            ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(0,0,0,0.8)';
            ctx.stroke();
            ctx.restore();
        }

        // スクロールバー描画
        function drawScrollbar(ctx, y) {
            ctx.fillStyle = '#1e293b'; // トラックの背景
            ctx.fillRect(0, y, canvas.width, state.sbHeight);

            if (state.pieces.length === 0) return;

            const contentWidth = state.pieces.length * state.traySpacing;
            if (contentWidth <= canvas.width) return; // スクロール不要

            // つまみの幅と位置
            const thumbWidth = Math.max(50, (canvas.width / contentWidth) * canvas.width);
            const thumbX = (state.trayScrollX / state.maxTrayScroll) * (canvas.width - thumbWidth);

            ctx.fillStyle = state.isDraggingScrollbar ? '#64748b' : '#475569';
            // 角丸のつまみ
            const padding = 3;
            ctx.beginPath();
            ctx.roundRect(thumbX, y + padding, thumbWidth, state.sbHeight - padding * 2, 5);
            ctx.fill();
        }

        // ボードに正解ピースを焼き付ける
        function stampPieceToBoard(piece) {
            state.boardCtx.save();
            state.boardCtx.translate(piece.c * state.pw, piece.r * state.ph);
            
            drawPiecePath(state.boardCtx, piece);
            state.boardCtx.clip();
            
            const srcX = piece.c * state.pw;
            const srcY = piece.r * state.ph;
            const ts = state.tabSize;
            
            state.boardCtx.drawImage(state.img, 
                srcX - ts, srcY - ts, state.pw + ts*2, state.ph + ts*2,
                -ts, -ts, state.pw + ts*2, state.ph + ts*2
            );
            
            // 境界線を少し描いてパズル感を残す
            state.boardCtx.lineWidth = 1.5;
            state.boardCtx.strokeStyle = 'rgba(0,0,0,0.3)';
            state.boardCtx.stroke();
            state.boardCtx.restore();
        }

        // --- 入力ハンドリング ---

        function getDistance(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }
        function getCenter(p1, p2) { return { x: (p1.x + p2.x)/2, y: (p1.y + p2.y)/2 }; }

        canvas.addEventListener('pointerdown', (e) => {
            if (!state.isPlaying) return;
            e.preventDefault();
            
            state.pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
            const keys = Object.keys(state.pointers);
            
            if (keys.length >= 2) {
                // ピンチズーム開始
                if (state.draggingPiece) {
                    // ドラッグ中ならキャンセルしてトレイの元の場所に戻す
                    state.pieces.splice(state.dragOriginalIndex, 0, state.draggingPiece);
                    state.draggingPiece = null;
                    state.dragOriginalIndex = -1;
                    updateTrayScrollBounds();
                }
                state.isPanning = false;
                state.isTrayScrolling = false;
                state.isDraggingScrollbar = false;
                
                const p1 = state.pointers[keys[0]];
                const p2 = state.pointers[keys[1]];
                state.initialPinchDist = getDistance(p1, p2);
                state.initialPinchZoom = state.camera.zoom;
                state.lastPinchCenter = getCenter(p1, p2);
                return;
            }

            const mx = e.clientX;
            const my = e.clientY;
            const ty = canvas.height - state.trayHeight;

            // 1. スクロールバー領域のクリック
            if (my >= canvas.height - state.sbHeight) {
                const contentWidth = state.pieces.length * state.traySpacing;
                if (contentWidth > canvas.width) {
                    state.isDraggingScrollbar = true;
                    // クリックした位置につまみを移動させる
                    const thumbWidth = Math.max(50, (canvas.width / contentWidth) * canvas.width);
                    let targetThumbX = mx - thumbWidth / 2;
                    targetThumbX = Math.max(0, Math.min(targetThumbX, canvas.width - thumbWidth));
                    state.trayScrollX = (targetThumbX / (canvas.width - thumbWidth)) * state.maxTrayScroll;
                }
                return;
            }

            // 2. トレイ領域のピースをクリック
            if (my > ty) {
                const scale = Math.min(1, (state.trayHeight - state.sbHeight - 20) / (state.ph + state.tabSize*2));
                const pTy = ty + (state.trayHeight - state.sbHeight - state.ph*scale)/2;
                
                let clickedIndex = -1;
                let clickedPx = 0;
                
                // トレイ上のピース判定
                for (let i = state.pieces.length - 1; i >= 0; i--) {
                    const px = i * state.traySpacing - state.trayScrollX + state.tabSize;
                    const visualPw = state.pw * scale;
                    const visualPh = state.ph * scale;
                    
                    if (mx >= px && mx <= px + visualPw && my >= pTy && my <= pTy + visualPh) {
                        clickedIndex = i;
                        clickedPx = px;
                        break;
                    }
                }

                if (clickedIndex !== -1) {
                    // ピースを拾う。配列から取り除く。
                    state.draggingPiece = state.pieces.splice(clickedIndex, 1)[0];
                    state.dragOriginalIndex = clickedIndex; // 元の位置を記憶
                    
                    // ドラッグ中のマウスポインタのズレを防ぐためのオフセット計算
                    state.dragOffset = { 
                        x: mx - clickedPx, 
                        y: my - pTy 
                    };
                    state.dragPos = { x: mx, y: my };
                    
                    updateTrayScrollBounds(); // 詰まったのでスクロール幅再計算
                } else {
                    // トレイの背景をドラッグでスクロール
                    state.isTrayScrolling = true;
                    state.lastPanPoint = { x: mx, y: my };
                }
                return;
            }

            // 3. ボード領域のドラッグ (パン移動)
            state.isPanning = true;
            state.lastPanPoint = { x: mx, y: my };
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!state.isPlaying) return;
            e.preventDefault();

            if (state.pointers[e.pointerId]) {
                state.pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
            }

            const keys = Object.keys(state.pointers);
            
            // ピンチズーム＆パン
            if (keys.length >= 2) {
                const p1 = state.pointers[keys[0]];
                const p2 = state.pointers[keys[1]];
                const dist = getDistance(p1, p2);
                const center = getCenter(p1, p2);

                if (!state.lastPinchCenter) {
                    state.lastPinchCenter = center;
                    return;
                }

                const zoomFactor = dist / state.initialPinchDist;
                let newZoom = state.initialPinchZoom * zoomFactor;
                newZoom = Math.max(0.1, Math.min(newZoom, 5));

                const bx = (center.x - state.camera.x) / state.camera.zoom;
                const by = (center.y - state.camera.y) / state.camera.zoom;
                
                state.camera.zoom = newZoom;
                state.camera.x = center.x - bx * state.camera.zoom;
                state.camera.y = center.y - by * state.camera.zoom;

                state.camera.x += center.x - state.lastPinchCenter.x;
                state.camera.y += center.y - state.lastPinchCenter.y;

                state.lastPinchCenter = center;
                return;
            }

            const mx = e.clientX;
            const my = e.clientY;

            if (state.draggingPiece) {
                // オフセットを考慮してドラッグ位置を更新
                state.dragPos.x = mx - state.dragOffset.x;
                state.dragPos.y = my - state.dragOffset.y;
            } else if (state.isPanning) {
                state.camera.x += mx - state.lastPanPoint.x;
                state.camera.y += my - state.lastPanPoint.y;
                state.lastPanPoint = { x: mx, y: my };
            } else if (state.isTrayScrolling) {
                state.trayScrollX -= (mx - state.lastPanPoint.x);
                state.trayScrollX = Math.max(0, Math.min(state.trayScrollX, state.maxTrayScroll));
                state.lastPanPoint = { x: mx, y: my };
            } else if (state.isDraggingScrollbar) {
                const contentWidth = state.pieces.length * state.traySpacing;
                const thumbWidth = Math.max(50, (canvas.width / contentWidth) * canvas.width);
                let targetThumbX = mx - thumbWidth / 2;
                targetThumbX = Math.max(0, Math.min(targetThumbX, canvas.width - thumbWidth));
                state.trayScrollX = (targetThumbX / (canvas.width - thumbWidth)) * state.maxTrayScroll;
            }
        });

        function handlePointerUp(e) {
            delete state.pointers[e.pointerId];
            if (Object.keys(state.pointers).length < 2) {
                state.lastPinchCenter = null;
            }

            if (state.draggingPiece) {
                const p = state.draggingPiece;
                const my = e.clientY;
                
                // ボード座標系でのマウスポインタ位置
                const bx = (state.dragPos.x - state.camera.x) / state.camera.zoom;
                const by = (state.dragPos.y - state.camera.y) / state.camera.zoom;
                
                const correctX = p.c * state.pw;
                const correctY = p.r * state.ph;
                
                // ドロップ位置が正解か判定 (ピースサイズの25%以内のズレなら吸着)
                const tolerance = Math.min(state.pw, state.ph) * 0.25;
                const dist = Math.hypot(bx - correctX, by - correctY);
                
                // トレイに落とした、または判定距離外の場合は元のインデックスに戻す
                if (my > canvas.height - state.trayHeight || dist > tolerance) {
                    // 自動でトレイの元いた場所(インデックス)に戻す。
                    state.pieces.splice(state.dragOriginalIndex, 0, p);
                    updateTrayScrollBounds();
                } else {
                    // 正解！ボードに焼き付ける
                    stampPieceToBoard(p);
                    state.placedCount++;
                    
                    // クリア判定
                    if (state.placedCount === state.totalPieces) {
                        setTimeout(() => {
                            winMessage.classList.remove('hidden');
                        }, 500);
                    }
                }
                
                // 状態リセット
                state.draggingPiece = null;
                state.dragOriginalIndex = -1;
            }
            
            state.isPanning = false;
            state.isTrayScrolling = false;
            state.isDraggingScrollbar = false;
        }

        canvas.addEventListener('pointerup', handlePointerUp);
        canvas.addEventListener('pointercancel', handlePointerUp);

        // マウスホイール
        canvas.addEventListener('wheel', (e) => {
            if (!state.isPlaying) return;
            e.preventDefault();
            
            const mx = e.clientX;
            const my = e.clientY;

            if (my > canvas.height - state.trayHeight) {
                // トレイの横スクロール
                const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
                state.trayScrollX += delta;
                state.trayScrollX = Math.max(0, Math.min(state.trayScrollX, state.maxTrayScroll));
            } else {
                // ボードのズーム
                const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1; 
                const bx = (mx - state.camera.x) / state.camera.zoom;
                const by = (my - state.camera.y) / state.camera.zoom;
                
                let newZoom = state.camera.zoom * zoomFactor;
                newZoom = Math.max(0.1, Math.min(newZoom, 6)); // 最大6倍
                
                state.camera.zoom = newZoom;
                state.camera.x = mx - bx * state.camera.zoom;
                state.camera.y = my - by * state.camera.zoom;
            }
        }, { passive: false });


        // --- メインループ ---
        function loop() {
            render();
            requestAnimationFrame(loop);
        }
        
        // 初期画面
        renderTitleScreen();
        // ループ開始
        requestAnimationFrame(loop);

    </script>
</body>
</html>
