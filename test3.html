<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
.train-info-container {
  font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
  color: #333;
  max-width: 1000px;
  margin: 0 auto;
  line-height: 1.6;
}

.yellow-bg {
  background-color: rgb(255, 255, 153);
  font-weight: bold;
  padding: 3px 8px 3px 10px;
  display: inline-block;
  margin-bottom: 5px;
  border-left: 6px solid #ffa500;
}

.history-group {
  margin-bottom: 20px;
}

.photo-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
  border: 1px solid #ccc;
}

.image-wrapper {
  text-align: center;
  padding: 10px 0 !important;
}

.image-wrapper img {
  max-width: 100%;
  height: auto;
  vertical-align: middle;
  display: inline-block;
}

.photo-table th {
  background-color: #f2f2f2;
  color: #333;
  width: 90px;
  padding: 10px;
  text-align: left;
  font-size: 14px;
  border: 1px solid #ccc;
}

.photo-table td {
  padding: 10px;
  border: 1px solid #ccc;
  font-size: 15px;
}

.related-link {
  margin-top: 20px;
  font-size: 130%;
}
</style>
</head>

<body>

<div class="train-info-container">

  <div class="history-group">
    <span class="yellow-bg">吹田新製配置</span><br>
    2008年10月27日（川重・三菱）
  </div>

  <div class="history-group">
    <span class="yellow-bg">塗装変更</span><br>
    2026年1月8日
  </div>

  <table class="photo-table">
    <tbody>

      <tr>
        <td colspan="2" class="image-wrapper">
          <a href="https://livedoor.blogimg.jp/kumapphoto/imgs/1/1/114bcf3e.jpg" title="IMG_20250715_1351" target="_blank">
            <img src="https://livedoor.blogimg.jp/kumapphoto/imgs/1/1/114bcf3e-s.jpg"
                 width="480"
                 height="320"
                 border="0"
                 alt="IMG_20250715_1351"
                 hspace="5"
                 class="pict">
          </a>
        </td>
      </tr>

      <tr>
        <th>撮影日</th>
        <td>2025年7月15日</td>
      </tr>

      <tr>
        <th>列車番号</th>
        <td>5073レ</td>
      </tr>

      <tr>
        <th>撮影地</th>
        <td>南草津</td>
      </tr>

      <tr>
        <th>備考</th>
        <td>代走（所定岡山EF210）</td>
      </tr>

    </tbody>
  </table>

  <div class="related-link">
    関連ページ：
    <a href="https://kumaphoto.doorblog.jp/archives/EF210.html" target="_self">
      EF210配置一覧
    </a>
  </div>

</div>

<br><br><br>

</body>
</html>
